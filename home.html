<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />



    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    
</head>
<body class="bg-[#F8FAFC]">

    <!-- header section -->
    <header class="bg-white">
        <div class="header-container flex flex-col md:flex-row gap-3 md:justify-between py-5 px-4 md:mx-9">
            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" class="w-10">
                <p class="font-semibold text-[24px]">GitHub Issues Tracker</p>
            </div>
            <div class="flex items-center gap-2">
          <input id="search-input" type="search" required placeholder="Search issues..." class="border-1 border-[#E9E9E9] p-2 rounded-sm w-full" />
          <button id="search-btn" class="btn btn-primary flex items-center"> <i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
            </div>
    </header>
    <!-- main section -->
    <main class="min-h-screen">
        <div class="w-full max-w-[1500px] mx-auto mt-[60px] p-[24px] bg-[#FFFFFF] rounded-md shadow-sm flex flex-col sm:flex-row justify-center sm:justify-start items-center gap-2">
            <button class="btn filter-btn btn-primary w-25">All</button>
            <button class="btn filter-btn w-25">Open</button>
            <button class="btn filter-btn w-25">Closed</button>
        </div>

        <section>
            <!-- section header -->
            <div class="w-full max-w-[1500px] mx-auto mt-[13px] p-[24px] bg-[#ffffff] rounded-md shadow-sm flex flex-col md:flex-row md:justify-between md:items-center gap-6">
            <div class="flex flex-col sm:flex-row items-center md:items-start text-center md:text-left gap-3">
            <div class="bg-purple-100 rounded-full w-12 h-12 flex items-center justify-center">
            <img src="./assets/Aperture.png" class="w-8 h-8 object-contain shrink-0">
            </div>

            <div class="flex flex-col">
            <span id="issue-count" class="font-semibold text-[20px]">50 Issues</span>
            <span class="text-[#64748B]">Track and manage your project issues</span>
            </div>
            </div>


            <div class="flex items-center justify-center md:justify-end w-full md:w-auto">
            <div class="dot-div flex items-center justify-center gap-2">
            <span class="w-3 h-3 bg-green-500 rounded-full inline-block"></span>
            <span>Open</span>
            <span class="w-3 h-3 bg-purple-500 rounded-full inline-block"></span>
            <span>Closed</span>
            </div>
            </div>
            </div>
            <!-- section card -->

            <div id="loading-spinner" class="flex justify-center items-center w-full py-10" style="display:none !important">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
         <div id="card-container" class="w-full max-w-[1500px] mx-auto mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 justify-items-center px-4">
               
            </div>
        </section>


        <!-- Open the modal using ID.showModal() method -->
        <dialog id="github-issue-modal" class="modal">
        <div class="modal-box space-y-4">
        <h3 id="modal-title" class="text-[24px] font-bold">Fix broken image uploads</h3>
        <div id="info">
        <span id="modal-status-badge" class="border rounded-full bg-[#00A96E] border-transparent text-white text-xs px-2 py-1">Opened</span>
        <span id="modal-author" class="text-[#64748B]">Opened by Fahim Ahmed</span>
        <span id="modal-date" class="text-[#64748B]">22/02/2026</span>
        </div>
        <div id="status-modal">
            <span id="status-one" class="border rounded-full bg-[#FEECEC] border-[#FECACA] text-[#EF4444] text-xs px-2 py-1">BUG</span>
            <span id="status-two" class="border rounded-full bg-[#FFF8DB] border-[#FDE68A] text-[#D97706] text-xs px-2 py-1">HELP WANTED</span>
        </div>
        <p id="modal-description" class="text-[#64748B]">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
        <div class="box flex gap-30 border border-transparent bg-[#F8FAFC] p-2 rounded-md">
            <div class="flex flex-col">
                <span class="text-[#64748B]">Assignee:</span>
                <span id="modal-assignee" class="font-bold"></span>
            </div>
            <div class="flex flex-col">
                <span class="text-[#64748B]">Priority:</span>
                <span id="modal-priority" class="border rounded-full bg-[#EF4444] border-transparent text-[#ffffff] text-center text-sm">High</span>
            </div>
        </div>
        <div class="modal-action">
        <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
        </form>
        </div>
        </div>
        </dialog>
    </main>

    <script src="./script/home.js"></script>
</body>
</html>
